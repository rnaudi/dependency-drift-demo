name: Dependency Drift
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: rnaudi/dependency-drift@main
        with:
          last: "0"
